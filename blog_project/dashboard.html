<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - EarthHow Admin</title>
    <link rel="icon" type="image/svg+xml" href="fav.svg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body style="background-color: var(--bg-light)">
    <!-- Header -->
    <header class="new-header">
      <div class="container header-content">
        <a href="index.html" class="logo new-logo"><span class="logo-icon">E</span> Earth<span>News</span> Dashboard</a>
        <nav class="new-nav">
          <ul>
            <li>
              <a href="index.html"><i class="fas fa-home"></i> Back to Site</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="dashboard-container">
      <div class="dashboard-header">
        <h2>Manage Blog Posts</h2>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 40px">
        <!-- Add Post Form -->
        <div>
          <h3>Create New Post</h3>
          <form id="post-form" style="margin-top: 20px">
            <div class="form-group">
              <label for="post-title">Title</label>
              <input
                type="text"
                id="post-title"
                required
                placeholder="Enter post title"
              />
            </div>

            <div class="form-group">
              <label for="post-category">Category</label>
              <select id="post-category" required>
                <option value="Atmosphere">Atmosphere</option>
                <option value="Biology">Biology</option>
                <option value="Career">Career</option>
                <option value="Geology">Geology</option>
                <option value="Space">Space</option>
                <option value="Water">Water</option>
              </select>
            </div>

            <div class="form-group">
              <label for="post-section">Display Section</label>
              <select id="post-section" required>
                <option value="latest">Latest Posts</option>
                <option value="category">Category Grid</option>
                <option value="infographic">Infographics</option>
                <option value="guide">Guides</option>
              </select>
            </div>

            <div class="form-group">
              <label for="post-image">Image URL</label>
              <input
                type="url"
                id="post-image"
                required
                placeholder="https://example.com/image.jpg"
              />
            </div>

            <div class="form-group">
              <label for="post-content">Short Content/Description</label>
              <textarea
                id="post-content"
                rows="4"
                placeholder="Enter a brief description..."
              ></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%">
              Create Post
            </button>
          </form>
        </div>

        <!-- Posts List -->
        <div>
          <h3>Existing Posts</h3>
          <table class="posts-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Category</th>
                <th>Section</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="posts-table-body">
              <!-- Populated by dashboard.js -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Need to load dashboard logic, and also app logic (for initial data if needed) -->
    <!-- But actually we just need dashboard.js for this page -->
    <script src="dashboard.js"></script>
  </body>
</html>
